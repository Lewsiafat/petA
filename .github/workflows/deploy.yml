name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build demo
        run: npx vite build --config vite.demo.config.ts

      - name: Setup VPS directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /srv/projects/pet-a/dist

      - name: Rsync files to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: dist-demo/
          remote_path: /srv/projects/pet-a/dist/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Setup nginx config
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            if [ ! -f /etc/nginx/conf.d/projects/pet-a.conf ]; then
              sudo tee /etc/nginx/conf.d/projects/pet-a.conf > /dev/null << 'EOF'
            location /pet-a/ {
                alias /srv/projects/pet-a/dist/;
                try_files $uri $uri/ /pet-a/index.html;
            }
            EOF
              sudo nginx -t && sudo systemctl reload nginx
            fi
